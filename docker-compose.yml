services:
  ritmosbot:
    image: ritmosbot:v2.0
    container_name: ritmosbot
    depends_on:
      mongodb:
        condition: service_healthy
      lavalink:
        condition: service_started
  # Retraso de 30s para esperar a lavalink y mongodb
    command: sh -c "sleep 30 && node ."
    # Reinicia cuando falla excepto cuando el apagado es manual
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    networks:
      - ritmosnet
    deploy:
      resources:
        limits:
          memory: 512M

  mongodb:
    image: mongo:8
    container_name: mongodb
    # Forzar escucha en todas las interfaces de red
    command: mongod --auth --bind_ip_all
    volumes:
      - mongodb-data:/data/db
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    healthcheck:
      # Verificar conexión autenticada para asegurar que MongoDB está listo de verdad
      test: ["CMD", "mongosh", "--username", "${MONGO_INITDB_ROOT_USERNAME}", "--password", "${MONGO_INITDB_ROOT_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    networks:
      - ritmosnet
    deploy:
      resources:
        limits:
          memory: 512M

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:latest
    container_name: lavalink
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${LAVALINK_PORT}:${LAVALINK_PORT}"
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml
    networks:
      - ritmosnet
    deploy:
      resources:
        limits:
          memory: 384M

volumes:
  mongodb-data:

networks:
  ritmosnet:
    driver: bridge # Configuración de red personalizada para aislar los contenedores
